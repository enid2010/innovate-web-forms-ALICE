<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Registration Form</title>
  <style>
    body {
      font-family: 'Comic Neue', cursive, Arial, sans-serif;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h2 {
      color: #fff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      font-size: 2em;
    }

    #registerForm {
      background-color: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      border: 2px solid #66a6ff;
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #66a6ff;
      border-radius: 10px;
      font-family: 'Comic Neue', cursive;
      font-size: 1em;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #ff69b4;
      box-shadow: 0 0 8px rgba(255, 105, 180, 0.4);
      outline: none;
    }

    /* Gender selection styling */
    .gender-group {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      align-items: center;
    }

    .gender-group label {
      font-weight: normal;
    }

    input[type="radio"] {
      accent-color: #ff69b4;
      transform: scale(1.2);
      cursor: pointer;
      transition: transform 0.2s, accent-color 0.2s;
    }

    input[type="radio"]:hover {
      transform: scale(1.3);
      accent-color: #ff85c1;
    }

    /* Submit button styling */
    button {
      padding: 14px;
      background-color: #66a6ff;
      color: #fff;
      font-size: 1.2em;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
    }

    button:hover {
      background-color: #89f7fe;
      transform: scale(1.02);
    }

    /* Optional: hover effect for the form container */
    #registerForm:hover {
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
      border-color: #ff69b4;
    }
  </style>
</head>
<body>
  <h2>student Register form</h2>
  <form id="registerForm" action="/register" method="POST">
    <label for="fullName">Full Name:</label>
    <input type="text" id="fullName" name="fullName" placeholder="Enter full name" required />

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter email" required />

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter password" required />

    <label>Choose your gender:</label>
    <div class="gender-group">
      <div>
        <input type="radio" id="male" name="gender" value="male" required />
        <label for="male">Male</label>
      </div>
      <div>
        <input type="radio" id="female" name="gender" value="female" required />
        <label for="female">Female</label>
      </div>
    </div>
    <!-- Submit button labeled as "Log In" -->
    <button type="submit" onclick="autoLogin()">Login</button>
  </form>
  <p>Already have an account? </p>

  <script>
  function autoLogin() {
    // Optionally, do validation here
    // Redirect to login page
    window.location.href = 'login.html';
  }
  </script>
</body>
</html>
